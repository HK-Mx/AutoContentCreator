version: '3.8'

services:
  # Ollama: Local LLM (gratis, para orquestación)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PREDICT: 128
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/generate"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # PostgreSQL (compatible Supabase)
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonomous_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Redis (caching)
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # Main app (FastAPI)
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/autonomous_agents
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    networks:
      - app_network

volumes:
  ollama_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
